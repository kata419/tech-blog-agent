name: Weekly Blog Pipeline

on:
  schedule:
    - cron: '0 6 * * 0'
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: weekly-blog-${{ github.ref }}
  cancel-in-progress: true

environment:
  name: production

jobs:
  build-and-publish:
    name: Generate and publish blog content
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      BLOGGER_BLOG_ID: ${{ secrets.BLOGGER_BLOG_ID }}
      BLOGGER_CLIENT_ID: ${{ secrets.BLOGGER_CLIENT_ID }}
      BLOGGER_CLIENT_SECRET: ${{ secrets.BLOGGER_CLIENT_SECRET }}
      BLOGGER_REFRESH_TOKEN: ${{ secrets.BLOGGER_REFRESH_TOKEN }}
      BLOGGER_OAUTH_FILE: credentials/blogger-oauth.json

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Verify Node and npm versions
        run: |
          set -euo pipefail
          echo "Node version: $(node -v)"
          echo "npm version: $(npm -v)"

      - name: Install dependencies
        run: |
          set -euo pipefail
          echo "Installing npm dependencies..."
          npm ci

      - name: Run typecheck
        run: |
          set -euo pipefail
          echo "Running TypeScript typecheck..."
          npm run typecheck

      - name: Build the TypeScript project
        run: |
          set -euo pipefail
          echo "Building the project..."
          npm run build

      - name: Run the Tech Blog pipeline
        run: |
          set -euo pipefail
          echo "Starting blog generation and publishing pipeline..."
          npm run dev

      - name: Validate publishing results
        if: always()
        run: |
          set -euo pipefail
          echo "Checking publish report for failures..."

          if [ ! -f output/reports/blogger-publish-report.json ]; then
            echo "Publish report was not generated." >&2
            exit 1
          fi

          node -e "const fs=require('fs'); const path='output/reports/blogger-publish-report.json'; const data=JSON.parse(fs.readFileSync(path,'utf8')); const failed=data.filter((entry)=>entry.status==='failed').length; const skipped=data.filter((entry)=>entry.status==='skipped').length; const published=data.filter((entry)=>entry.status==='published').length; console.log(JSON.stringify({ published, skipped, failed, total: data.length }, null, 2)); if (failed > 0) process.exit(1);"

      - name: Write workflow summary
        if: always()
        run: |
          set -euo pipefail
          {
            echo "## Workflow Summary";
            echo "- Status: ${{ job.status }}";
            echo "- Node: $(node -v)";
            echo "- npm: $(npm -v)";
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload generated content artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tech-blog-artifacts
          path: |
            output/articles
            output/reports
          if-no-files-found: error
          retention-days: 30

      - name: Print workflow summary
        if: always()
        run: |
          echo "Workflow completed."
          echo "Artifacts were uploaded successfully."
          find output -maxdepth 3 -type f | sort | sed -n '1,80p'
